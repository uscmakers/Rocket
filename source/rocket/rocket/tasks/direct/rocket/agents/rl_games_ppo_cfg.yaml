params:
  seed: 42

  # environment wrapper clipping
  env:
    # added to the wrapper
    clip_observations: 5.0
    # can make custom wrapper?
    clip_actions: 1.0

  algo:
    name: a2c_continuous

  model:
    name: continuous_a2c_logstd

  # doesn't have this fine grained control but made it close
  network:
    name: actor_critic
    separate: False
    space:
      continuous:
        mu_activation: None
        sigma_activation: None

        mu_init:
          name: default
        sigma_init:
          name: const_initializer
          val: 0
        fixed_sigma: True
    mlp:
      units: [512, 256, 128]
      activation: elu
      d2rl: False

      initializer:
        name: default
      regularizer:
        name: None

  load_checkpoint: False # flag which sets whether to load the checkpoint
  load_path: '' # path to the checkpoint to load

  config:
    name: rocket_direct
    env_name: rlgpu
    device: 'cuda:0'
    device_name: 'cuda:0'
    multi_gpu: False
    ppo: True
    mixed_precision: False
    normalize_input: True
    normalize_value: True
    num_actors: -1  # configured from the script (based on num_envs)
    reward_shaper:
      scale_value: 0.1
    normalize_advantage: True
    gamma: 0.99
    tau : 0.95
    learning_rate: 5e-4
    lr_schedule: adaptive
    kl_threshold: 0.016       # was 0.008 — too tight; shrinks LR too aggressively, slows convergence
    score_to_win: 50000
    max_epochs: 1500          # was 500 — biped standing from scratch needs 1000-2000 epochs
    save_best_after: 50
    save_frequency: 25
    grad_norm: 1.0
    entropy_coef: 0.001       # was 0.0 — small entropy bonus prevents premature collapse during hard balance init
    truncate_grads: True
    e_clip: 0.2
    horizon_length: 64        # was 32 (~0.53s) — too short for balance credit assignment; 64 = ~1.07s
    minibatch_size: 16384
    mini_epochs: 8
    critic_coef: 2            # was 4 — high critic_coef destabilizes shared actor/critic network
    clip_value: True
    seq_length: 4
    bounds_loss_coef: 0.0001
